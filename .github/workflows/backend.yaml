name: backend deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT REPO
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # CREATE .env FILE
      # =========================
      - name: Create .env file
        shell: bash
        env:
          NEXT_PUBLIC_GRAPHQL_KEY: ${{ secrets.NEXT_PUBLIC_GRAPHQL_KEY }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          # ... add all other secrets as needed ...
        run: |
          set -e
          > .env
          # STATIC VALUES
          printf "NEXT_PUBLIC_HOST_URL=%s\n" "https://www.meradhan.co" >> .env
          printf "NEXT_PUBLIC_CRM_HOST_URL=%s\n" "https://crm.meradhan.co" >> .env
          printf "NEXT_PUBLIC_BACKEND_HOST_URL=%s\n" "https://api.meradhan.co" >> .env
          printf "PORT=%s\n" "4000" >> .env

          # SAFE LOOP: only include relevant variables
          for var in $(env | cut -d= -f1); do
            case "$var" in
              NEXT_PUBLIC_*|STRAPI_*|JWT_*|DATABASE_*|DIRECT_*|REDIS_*|KRA_*|MSG91_*|SMTP_*|CBRICS_*|RFQ_*|DIGIO_*|NDSL_*|NSDL_*|CDSL_*|ENTITY_*|AUTH_*|RAZORPAY_*|S3_*)
                value="${!var}"
                value="$(echo "$value" | tr -d '\r\n')"   # 🔥 remove hidden chars
                printf "%s=%s\n" "$var" "$value" >> .env
                ;;
            esac
          done

      # =========================
      # DEBUG (SAFE)
      # =========================
      - name: Debug ENV (masked)
        run: |
          echo "===== DEBUG ENV ====="
          for var in $(env | cut -d= -f1); do
            case "$var" in
              NEXT_PUBLIC_*|STRAPI_*|JWT_*|DATABASE_*|DIRECT_*|REDIS_*)
                val="${!var}"
                echo "$var = len:${#val} preview:${val:0:4}****"
                ;;
            esac
          done

      # =========================
      # CLEAN AWS SECRETS
      # =========================
      - name: Clean AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID_CLEAN=$(echo '${{ secrets.AWS_ACCESS_KEY_ID }}' | tr -d '\r\n')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY_CLEAN=$(echo '${{ secrets.AWS_SECRET_ACCESS_KEY }}' | tr -d '\r\n')" >> $GITHUB_ENV
          echo "AWS_REGION_CLEAN=$(echo '${{ secrets.AWS_REGION }}' | tr -d '\r\n')" >> $GITHUB_ENV

      # =========================
      # AWS LOGIN
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID_CLEAN }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY_CLEAN }}
          aws-region: ${{ env.AWS_REGION_CLEAN }}

      # =========================
      # ECR LOGIN
      # =========================
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # =========================
      # BUILD + PUSH DOCKER IMAGE
      # =========================
      - name: Build and Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: meradhan-backend
          IMAGE_TAG: latest
        run: |
          docker build -f backenddocker -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      # =========================
      # DEPLOY TO ECS
      # =========================
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: meradhan-be-task.json
          cluster: prod-cluster
          service: prod-meredha-be
          force-new-deployment: true
