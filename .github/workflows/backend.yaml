name: backend deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # CREATE .env FILE
      # =========================
      - name: Create .env file
        shell: bash
        env:
          NEXT_PUBLIC_GRAPHQL_KEY: ${{ secrets.NEXT_PUBLIC_GRAPHQL_KEY }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}

        run: |
          set -e
          > .env

          printf "PORT=%s\n" "4000" >> .env

          # SAFE LOOP
          while IFS='=' read -r var _; do
            case "$var" in
              NEXT_PUBLIC_*|STRAPI_*|JWT_*|DATABASE_*|DIRECT_*|REDIS_*)
                value="${!var}"
                value="$(echo "$value" | tr -d '\r')"   # 🔥 remove hidden chars
                printf "%s=%s\n" "$var" "$value" >> .env
                ;;
            esac
          done < <(env)

      # =========================
      # FIX AWS SECRETS (CRITICAL)
      # =========================
      - name: Clean AWS credentials
        id: awscreds
        run: |
          echo "AWS_ACCESS_KEY_ID_CLEAN=$(echo '${{ secrets.AWS_ACCESS_KEY_ID }}' | tr -d '\r\n')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY_CLEAN=$(echo '${{ secrets.AWS_SECRET_ACCESS_KEY }}' | tr -d '\r\n')" >> $GITHUB_ENV
          echo "AWS_REGION_CLEAN=$(echo '${{ secrets.AWS_REGION }}' | tr -d '\r\n')" >> $GITHUB_ENV

      # =========================
      # AWS LOGIN
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID_CLEAN }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY_CLEAN }}
          aws-region: ${{ env.AWS_REGION_CLEAN }}

      # =========================
      # ECR LOGIN
      # =========================
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # =========================
      # BUILD + PUSH
      # =========================
      - name: Build and Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: meradhan-backend
          IMAGE_TAG: latest
        run: |
          docker build -f backenddocker -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      # =========================
      # DEPLOY ECS
      # =========================
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: meradhan-be-task.json
          cluster: prod-cluster
          service: prod-meredha-be
          force-new-deployment: true
