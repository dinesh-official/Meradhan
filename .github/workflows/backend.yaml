name: backend deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env from GitHub Secrets
        shell: bash
        env:
          E_GRAPHQL_KEY: ${{ secrets.NEXT_PUBLIC_GRAPHQL_KEY }}
          E_STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          E_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          E_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          E_DIRECT_URL: ${{ secrets.DIRECT_URL }}
          E_REDIS_HOST: ${{ secrets.REDIS_HOST }}
          E_REDIS_PORT: ${{ secrets.REDIS_PORT }}
          E_KRA_USERNAME: ${{ secrets.KRA_USERNAME }}
          E_KRA_PASSWORD: ${{ secrets.KRA_PASSWORD }}
          E_KRA_PASS_KEY: ${{ secrets.KRA_PASS_KEY }}
          E_KRA_MOB_NO: ${{ secrets.KRA_MOB_NO }}
          E_KRA_OKRA_CD_MI_ID: ${{ secrets.KRA_OKRA_CD_MI_ID }}
          E_KRA_ENV: ${{ secrets.KRA_ENV }}
          E_MSG91_AUTH_KEY: ${{ secrets.MSG91_AUTH_KEY }}
          E_MSG91_SIGNUP_TEMPLATE: ${{ secrets.MSG91_SIGNUP_TEMPLATE }}
          E_MSG91_LOGIN_TEMPLATE: ${{ secrets.MSG91_LOGIN_TEMPLATE }}
          E_MSG91_VERIFY_TEMPLATE: ${{ secrets.MSG91_VERIFY_TEMPLATE }}
          E_SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          E_SMTP_HOST: ${{ secrets.SMTP_HOST }}
          E_SMTP_PORT: ${{ secrets.SMTP_PORT }}
          E_SMTP_USER: ${{ secrets.SMTP_USER }}
          E_SMTP_PASS: ${{ secrets.SMTP_PASS }}
          E_CBRICS_DOMAIN: ${{ secrets.CBRICS_DOMAIN }}
          E_CBRICS_LOGIN: ${{ secrets.CBRICS_LOGIN }}
          E_CBRICS_PASSWORD: ${{ secrets.CBRICS_PASSWORD }}
          E_RFQ_CBRICS_DOMAIN: ${{ secrets.RFQ_CBRICS_DOMAIN }}
          E_RFQ_CBRICS_LOGIN: ${{ secrets.RFQ_CBRICS_LOGIN }}
          E_RFQ_CBRICS_PASSWORD: ${{ secrets.RFQ_CBRICS_PASSWORD }}
          E_DIGIO_USERNAME_PASS: ${{ secrets.DIGIO_USERNAME_PASS }}
          E_NDSL_REQUESTOR_ID: ${{ secrets.NDSL_REQUESTOR_ID }}
          E_NSDL_SECRET_KEY: ${{ secrets.NSDL_SECRET_KEY }}
          E_CDSL_AES_KEY: ${{ secrets.CDSL_AES_KEY }}
          E_ENTITY_ID: ${{ secrets.ENTITY_ID }}
          E_AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          E_AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          E_AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          E_AUTH_FACEBOOK_ID: ${{ secrets.AUTH_FACEBOOK_ID }}
          E_AUTH_FACEBOOK_SECRET: ${{ secrets.AUTH_FACEBOOK_SECRET }}
          E_AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          E_AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
          E_AUTH_MICROSOFT_ENTRA_ID_ISSUER: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ISSUER }}
          E_RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          E_RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          E_RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          E_CDSL_MODE: ${{ secrets.CDSL_MODE }}
          E_NSDL_MODE: ${{ secrets.NSDL_MODE }}
          E_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          E_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          E_S3_REGION: ${{ secrets.S3_REGION }}
          E_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          E_S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          exec > /dev/null 2>&1
          # Static values
          printf 'NEXT_PUBLIC_HOST_URL=%s\n'         "https://www.meradhan.co"                     > .env
          printf 'NEXT_PUBLIC_CRM_HOST_URL=%s\n'     "https://crm.meradhan.co"                     >> .env
          printf 'NEXT_PUBLIC_BACKEND_HOST_URL=%s\n' "https://api.meradhan.co"                     >> .env
          printf 'NEXT_PUBLIC_BACKEND_IP_URL=%s\n'   "http://prod-meradhan-be.prod-namespace:4000" >> .env
          printf 'NEXT_PUBLIC_STRAPI_HOST_URL=%s\n'  "https://spyder.meradhan.co"                  >> .env
          printf 'NEXT_PUBLIC_DIGIO=%s\n'            "production"                                  >> .env
          printf 'STRAPI_API_URL=%s\n'               "https://spyder.meradhan.co/api"              >> .env
          printf 'PORT=%s\n'                         "4000"                                        >> .env
          printf 'RFQ_CBRICS_ENV=%s\n'               "PROD"                                        >> .env
          printf 'CBRICS_ENV=%s\n'                   "PROD"                                        >> .env

          # Secrets — values come from env vars, never injected raw into shell
          printf 'GRAPHQL_KEY=%s\n'                    "$E_GRAPHQL_KEY"                    >> .env
          printf 'STRAPI_API_TOKEN=%s\n'               "$E_STRAPI_API_TOKEN"               >> .env
          printf 'JWT_SECRET=%s\n'                     "$E_JWT_SECRET"                     >> .env
          printf 'DATABASE_URL=%s\n'                   "$E_DATABASE_URL"                   >> .env
          printf 'DIRECT_URL=%s\n'                     "$E_DIRECT_URL"                     >> .env
          printf 'REDIS_HOST=%s\n'                     "$E_REDIS_HOST"                     >> .env
          printf 'REDIS_PORT=%s\n'                     "$E_REDIS_PORT"                     >> .env
          printf 'KRA_USERNAME=%s\n'                   "$E_KRA_USERNAME"                   >> .env
          printf 'KRA_PASSWORD=%s\n'                   "$E_KRA_PASSWORD"                   >> .env
          printf 'KRA_PASS_KEY=%s\n'                   "$E_KRA_PASS_KEY"                   >> .env
          printf 'KRA_MOB_NO=%s\n'                     "$E_KRA_MOB_NO"                     >> .env
          printf 'KRA_OKRA_CD_MI_ID=%s\n'              "$E_KRA_OKRA_CD_MI_ID"              >> .env
          printf 'KRA_ENV=%s\n'                        "$E_KRA_ENV"                        >> .env
          printf 'MSG91_AUTH_KEY=%s\n'                 "$E_MSG91_AUTH_KEY"                 >> .env
          printf 'MSG91_SIGNUP_TEMPLATE=%s\n'          "$E_MSG91_SIGNUP_TEMPLATE"          >> .env
          printf 'MSG91_LOGIN_TEMPLATE=%s\n'           "$E_MSG91_LOGIN_TEMPLATE"           >> .env
          printf 'MSG91_VERIFY_TEMPLATE=%s\n'          "$E_MSG91_VERIFY_TEMPLATE"          >> .env
          printf 'SMTP_SENDER=%s\n'                    "$E_SMTP_SENDER"                    >> .env
          printf 'SMTP_HOST=%s\n'                      "$E_SMTP_HOST"                      >> .env
          printf 'SMTP_PORT=%s\n'                      "$E_SMTP_PORT"                      >> .env
          printf 'SMTP_USER=%s\n'                      "$E_SMTP_USER"                      >> .env
          printf 'SMTP_PASS=%s\n'                      "$E_SMTP_PASS"                      >> .env
          printf 'CBRICS_DOMAIN=%s\n'                  "$E_CBRICS_DOMAIN"                  >> .env
          printf 'CBRICS_LOGIN=%s\n'                   "$E_CBRICS_LOGIN"                   >> .env
          printf 'CBRICS_PASSWORD=%s\n'                "$E_CBRICS_PASSWORD"                >> .env
          printf 'RFQ_CBRICS_DOMAIN=%s\n'              "$E_RFQ_CBRICS_DOMAIN"              >> .env
          printf 'RFQ_CBRICS_LOGIN=%s\n'               "$E_RFQ_CBRICS_LOGIN"               >> .env
          printf 'RFQ_CBRICS_PASSWORD=%s\n'            "$E_RFQ_CBRICS_PASSWORD"            >> .env
          printf 'DIGIO_USERNAME_PASS=%s\n'            "$E_DIGIO_USERNAME_PASS"            >> .env
          printf 'NDSL_REQUESTOR_ID=%s\n'              "$E_NDSL_REQUESTOR_ID"              >> .env
          printf 'NSDL_SECRET_KEY=%s\n'                "$E_NSDL_SECRET_KEY"                >> .env
          printf 'CDSL_AES_KEY=%s\n'                   "$E_CDSL_AES_KEY"                   >> .env
          printf 'ENTITY_ID=%s\n'                      "$E_ENTITY_ID"                      >> .env
          printf 'AUTH_SECRET=%s\n'                    "$E_AUTH_SECRET"                    >> .env
          printf 'AUTH_GOOGLE_ID=%s\n'                 "$E_AUTH_GOOGLE_ID"                 >> .env
          printf 'AUTH_GOOGLE_SECRET=%s\n'             "$E_AUTH_GOOGLE_SECRET"             >> .env
          printf 'AUTH_FACEBOOK_ID=%s\n'               "$E_AUTH_FACEBOOK_ID"               >> .env
          printf 'AUTH_FACEBOOK_SECRET=%s\n'           "$E_AUTH_FACEBOOK_SECRET"           >> .env
          printf 'AUTH_MICROSOFT_ENTRA_ID_ID=%s\n'     "$E_AUTH_MICROSOFT_ENTRA_ID_ID"     >> .env
          printf 'AUTH_MICROSOFT_ENTRA_ID_SECRET=%s\n' "$E_AUTH_MICROSOFT_ENTRA_ID_SECRET" >> .env
          printf 'AUTH_MICROSOFT_ENTRA_ID_ISSUER=%s\n' "$E_AUTH_MICROSOFT_ENTRA_ID_ISSUER" >> .env
          printf 'RAZORPAY_KEY_ID=%s\n'                "$E_RAZORPAY_KEY_ID"                >> .env
          printf 'RAZORPAY_KEY_SECRET=%s\n'            "$E_RAZORPAY_KEY_SECRET"            >> .env
          printf 'RAZORPAY_WEBHOOK_SECRET=%s\n'        "$E_RAZORPAY_WEBHOOK_SECRET"        >> .env
          printf 'CDSL_MODE=%s\n'                      "$E_CDSL_MODE"                      >> .env
          printf 'NSDL_MODE=%s\n'                      "$E_NSDL_MODE"                      >> .env
          printf 'S3_ACCESS_KEY_ID=%s\n'               "$E_S3_ACCESS_KEY_ID"               >> .env
          printf 'S3_SECRET_ACCESS_KEY=%s\n'           "$E_S3_SECRET_ACCESS_KEY"           >> .env
          printf 'S3_REGION=%s\n'                      "$E_S3_REGION"                      >> .env
          printf 'S3_ENDPOINT=%s\n'                    "$E_S3_ENDPOINT"                    >> .env
          printf 'S3_BUCKET_NAME=%s\n'                 "$E_S3_BUCKET_NAME"                 >> .env

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Show .env
        run: cat .env

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: meradhan-backend
          IMAGE_TAG: latest
        run: |
          docker build -f backenddocker -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: meradhan-be-task.json
          cluster: prod-cluster
          service: prod-meredha-be
          force-new-deployment: true
