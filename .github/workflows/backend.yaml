name: backend deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ FIXED: Safe .env creation (no syntax error)
      - name: Create .env from GitHub Secrets
        shell: bash
        run: |
          set -e

          add_env() {
            # Properly escape the value to handle special characters
            printf '%s=%s\n' "$1" "$2" >> .env
          }

          # Clear existing .env file
          > .env

          # Static values
          add_env "NEXT_PUBLIC_HOST_URL" "https://www.meradhan.co"
          add_env "NEXT_PUBLIC_CRM_HOST_URL" "https://crm.meradhan.co"
          add_env "NEXT_PUBLIC_BACKEND_HOST_URL" "https://api.meradhan.co"
          add_env "NEXT_PUBLIC_BACKEND_IP_URL" "http://prod-meradhan-be.prod-namespace:4000"
          add_env "NEXT_PUBLIC_STRAPI_HOST_URL" "https://spyder.meradhan.co"
          add_env "NEXT_PUBLIC_DIGIO" "production"
          add_env "STRAPI_API_URL" "https://spyder.meradhan.co/api"
          add_env "PORT" "4000"

          add_env "RFQ_CBRICS_ENV" "PROD"
          add_env "CBRICS_ENV" "PROD"

          # Secrets (SAFE)
          add_env "GRAPHQL_KEY" "${{ secrets.NEXT_PUBLIC_GRAPHQL_KEY }}"
          add_env "STRAPI_API_TOKEN" "${{ secrets.STRAPI_API_TOKEN }}"
          add_env "JWT_SECRET" "${{ secrets.JWT_SECRET }}"
          add_env "DATABASE_URL" "${{ secrets.DATABASE_URL }}"
          add_env "DIRECT_URL" "${{ secrets.DIRECT_URL }}"

          add_env "REDIS_HOST" "${{ secrets.REDIS_HOST }}"
          add_env "REDIS_PORT" "${{ secrets.REDIS_PORT }}"

          add_env "KRA_USERNAME" "${{ secrets.KRA_USERNAME }}"
          add_env "KRA_PASSWORD" "${{ secrets.KRA_PASSWORD }}"
          add_env "KRA_PASS_KEY" "${{ secrets.KRA_PASS_KEY }}"
          add_env "KRA_MOB_NO" "${{ secrets.KRA_MOB_NO }}"
          add_env "KRA_OKRA_CD_MI_ID" "${{ secrets.KRA_OKRA_CD_MI_ID }}"
          add_env "KRA_ENV" "${{ secrets.KRA_ENV }}"

          add_env "MSG91_AUTH_KEY" "${{ secrets.MSG91_AUTH_KEY }}"
          add_env "MSG91_SIGNUP_TEMPLATE" "${{ secrets.MSG91_SIGNUP_TEMPLATE }}"
          add_env "MSG91_LOGIN_TEMPLATE" "${{ secrets.MSG91_LOGIN_TEMPLATE }}"
          add_env "MSG91_VERIFY_TEMPLATE" "${{ secrets.MSG91_VERIFY_TEMPLATE }}"

          add_env "SMTP_SENDER" "${{ secrets.SMTP_SENDER }}"
          add_env "SMTP_HOST" "${{ secrets.SMTP_HOST }}"
          add_env "SMTP_PORT" "${{ secrets.SMTP_PORT }}"
          add_env "SMTP_USER" "${{ secrets.SMTP_USER }}"
          add_env "SMTP_PASS" "${{ secrets.SMTP_PASS }}"

          add_env "CBRICS_DOMAIN" "${{ secrets.CBRICS_DOMAIN }}"
          add_env "CBRICS_LOGIN" "${{ secrets.CBRICS_LOGIN }}"
          add_env "CBRICS_PASSWORD" "${{ secrets.CBRICS_PASSWORD }}"

          add_env "RFQ_CBRICS_DOMAIN" "${{ secrets.RFQ_CBRICS_DOMAIN }}"
          add_env "RFQ_CBRICS_LOGIN" "${{ secrets.RFQ_CBRICS_LOGIN }}"
          add_env "RFQ_CBRICS_PASSWORD" "${{ secrets.RFQ_CBRICS_PASSWORD }}"

          add_env "DIGIO_USERNAME_PASS" "${{ secrets.DIGIO_USERNAME_PASS }}"
          add_env "NDSL_REQUESTOR_ID" "${{ secrets.NDSL_REQUESTOR_ID }}"
          add_env "NSDL_SECRET_KEY" "${{ secrets.NSDL_SECRET_KEY }}"
          add_env "CDSL_AES_KEY" "${{ secrets.CDSL_AES_KEY }}"
          add_env "ENTITY_ID" "${{ secrets.ENTITY_ID }}"

          add_env "AUTH_SECRET" "${{ secrets.AUTH_SECRET }}"
          add_env "AUTH_GOOGLE_ID" "${{ secrets.AUTH_GOOGLE_ID }}"
          add_env "AUTH_GOOGLE_SECRET" "${{ secrets.AUTH_GOOGLE_SECRET }}"
          add_env "AUTH_FACEBOOK_ID" "${{ secrets.AUTH_FACEBOOK_ID }}"
          add_env "AUTH_FACEBOOK_SECRET" "${{ secrets.AUTH_FACEBOOK_SECRET }}"
          add_env "AUTH_MICROSOFT_ENTRA_ID_ID" "${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}"
          add_env "AUTH_MICROSOFT_ENTRA_ID_SECRET" "${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}"
          add_env "AUTH_MICROSOFT_ENTRA_ID_ISSUER" "${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ISSUER }}"

          add_env "RAZORPAY_KEY_ID" "${{ secrets.RAZORPAY_KEY_ID }}"
          add_env "RAZORPAY_KEY_SECRET" "${{ secrets.RAZORPAY_KEY_SECRET }}"
          add_env "RAZORPAY_WEBHOOK_SECRET" "${{ secrets.RAZORPAY_WEBHOOK_SECRET }}"

          add_env "CDSL_MODE" "${{ secrets.CDSL_MODE }}"
          add_env "NSDL_MODE" "${{ secrets.NSDL_MODE }}"

          add_env "S3_ACCESS_KEY_ID" "${{ secrets.S3_ACCESS_KEY_ID }}"
          add_env "S3_SECRET_ACCESS_KEY" "${{ secrets.S3_SECRET_ACCESS_KEY }}"
          add_env "S3_REGION" "${{ secrets.S3_REGION }}"
          add_env "S3_ENDPOINT" "${{ secrets.S3_ENDPOINT }}"
          add_env "S3_BUCKET_NAME" "${{ secrets.S3_BUCKET_NAME }}"

          echo "✅ .env file created successfully"

      # AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Debug (optional - remove in production)
      - name: Show .env (hide sensitive values)
        run: |
          echo "=== .env file contents (values masked) ==="
          cat .env | sed 's/=.*/=***/' 
          echo "=== End of .env ==="

      # Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build & Push
      - name: Build, Tag & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: prod-meradhan-be
          IMAGE_TAG: latest
        run: |
          docker build -f backenddocker -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      # Deploy ECS
      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: meradhan-be-task.json
          cluster: prod-cluster
          service: prod-meredha-be
          force-new-deployment: true
