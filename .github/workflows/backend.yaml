name: backend deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate .env from GitHub Secrets
        shell: bash
        env:
          NEXT_PUBLIC_GRAPHQL_KEY: ${{ secrets.NEXT_PUBLIC_GRAPHQL_KEY }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
        run: |
          set -e
          > .env
          cat <<EOF >> .env
          NEXT_PUBLIC_HOST_URL=https://www.meradhan.co
          NEXT_PUBLIC_CRM_HOST_URL=https://crm.meradhan.co
          NEXT_PUBLIC_BACKEND_HOST_URL=https://api.meradhan.co
          NEXT_PUBLIC_BACKEND_IP_URL=http://prod-meradhan-be.prod-namespace:4000
          NEXT_PUBLIC_STRAPI_HOST_URL=https://spyder.meradhan.co
          NEXT_PUBLIC_DIGIO=production
          STRAPI_API_URL=https://spyder.meradhan.co/api
          PORT=4000
          RFQ_CBRICS_ENV=PROD
          CBRICS_ENV=PROD
          EOF
          for var in $(env | cut -d= -f1); do
            case "$var" in
              NEXT_PUBLIC_*|STRAPI_*|JWT_*|DATABASE_*|DIRECT_*|REDIS_*|KRA_*|MSG91_*|SMTP_*|CBRICS_*|RFQ_*|DIGIO_*|NDSL_*|NSDL_*|CDSL_*|ENTITY_*|AUTH_*|RAZORPAY_*|S3_*)
                val="${!var}"
                val_clean=$(echo "$val" | tr -d '\r\n')
                printf "%s=%s\n" "$var" "$val_clean" >> .env
                ;;
            esac
          done

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          REPOSITORY: prod-meradhan-be
          IMAGE_TAG: latest
        run: |
          docker build --pull -f backenddocker -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: meradhan-be-task.json
          cluster: prod-cluster
          service: prod-meredha-be
          force-new-deployment: true
